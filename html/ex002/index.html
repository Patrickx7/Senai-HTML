  <body>
    <h1>Trabalhando com Listas</h1>

    <h2>Listas não ordenadas - Compra de materias escolares</h2>

      <li>Caneta</li>

    <h2>Listas ordenadas - Receita de café</h2>

    <ol type="1" start="3">
      <li>Esquentar a água.</li>
      <li>Adoçar a água.</li>
      <li>Colocar o pó de café.</li>

      <li>Servir o café.</li>
    </ol>
